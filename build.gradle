plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation 'org.postgresql:postgresql:42.7.10'

    // Source: https://mvnrepository.com/artifact/org.flywaydb/flyway-core
    //implementation group: 'org.flywaydb', name: 'flyway-core', version: '12.1.1'
    implementation 'org.flywaydb:flyway-core:12.0.2'
    implementation 'org.flywaydb:flyway-database-postgresql:12.0.2'
    // Source: https://mvnrepository.com/artifact/org.hibernate.orm/hibernate-core
    implementation group: 'org.hibernate.orm', name: 'hibernate-core', version: '7.3.0.Final'
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += "-Duser.timezone=UTC"
}